opencollection: 1.0.0

info:
  name: Infotex

request:
  variables:
    - name: prod_domain
      value: ""
    - name: prod_username
      value: ""
    - name: prod_password
      value: ""
    - name: stage_domain
      value: ""
    - name: stage_username
      value: ""
    - name: stage_password
      value: ""

docs:
  type: text/markdown
  content: |
    # Коллекция API Infotex
    
    Данная коллекция предназначена для интеграции с сервисами Infotex (идентификация, получение данных ЦП, работа с ЕСИА).
    
    ## 🔐 Настройка доступа и секретов
    
    Коллекция использует переменные окружения для гибкости и безопасности.
    
    1. **.env.example** — шаблон со списком всех необходимых переменных (ID клиента, секреты, базовые URL).
    2. **.env** — ваш локальный файл с реальными доступами. **Создайте его вручную** в папке `collections/Infotex/`, скопировав содержимое из `.env.example`.
    3. **Environments (Окружения)** — в папке `environments/` настроены профили (например, `Prod`). Они определяют базовый хост и связывают переменные из интерфейса с системными переменными вашего `.env`.
    
    > **Важно:** Никогда не вписывайте пароли напрямую в запросы. Используйте конструкцию `{{process.env.VARIABLE_NAME}}`.
    
    ## 🔑 Работа с токеном (Auth)
    
    Для большинства запросов требуется заголовок `Authorization: Bearer <token>`.
    
    ### Как получить токен:
    1. Выберите запрос **"2.2-Получить токен"**.
    2. Убедитесь, что в вашем `.env` заполнены данные для авторизации.
    3. Выполните запрос.
    4. В коллекции настроен **Post-Response Script**, который автоматически сохраняет полученный `access_token` в переменную коллекции (State).
    
    ### Как это работает (State):
    Вам не нужно копировать токен вручную во все остальные запросы. В настройках авторизации коллекции (или конкретных папок) прописано использование переменной `{{infotex_token}}`. После успешного выполнения запроса на получение токена, эта переменная обновится автоматически.
    
    ## 🔄 Работа с потоками (State & Workflow)
    
    Многие запросы в этой коллекции взаимосвязаны (например, создание потока -> получение адреса -> передача кода).
    
    - **Передача данных:** Если один запрос возвращает ID (например, `flowId`), скрипты в коллекции сохраняют его в "состояние" (Collection Variables).
    - **Использование:** В последующих запросах этот ID подставляется автоматически через `{{flowId}}`.
    - **Обновление:** Если вы создали новый поток, переменная обновится, и все последующие запросы будут работать уже с новым ID.
    
    ## 🛠 Советы по разработке
    
    1. **Логирование:** Если запрос не проходит, проверьте вкладку **Timeline** в Bruno, чтобы увидеть сырой запрос и ответ.
    2. **Скрипты:** Вы можете посмотреть логику сохранения переменных во вкладке **Script** -> **Post-Response** у конкретных запросов.
    3. **Обновление:** Если API Infotex изменилось, обновите соответствующий `.yml` файл и закоммитьте изменения в Git, чтобы коллеги получили актуальную версию.

bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
